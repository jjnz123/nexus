name: SonarQube Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sonarqube:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SonarQube secrets and connectivity
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "::error::SONAR_TOKEN is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          if [ -z "${SONAR_HOST_URL:-}" ]; then
            echo "::error::SONAR_HOST_URL is not set. Example: https://sonarqube.q1.co.nz"
            exit 1
          fi

          URL="${SONAR_HOST_URL%/}"
          echo "SONAR_HOST_URL length: ${#SONAR_HOST_URL}"
          echo "SONAR_TOKEN length: ${#SONAR_TOKEN}"

          is_cloudflare_block() {
            grep -qiE 'cloudflare|cf-error-details|you have been blocked' "$1"
          }

          echo "Checking server reachability (no auth)..."
          STATUS_CODE=$(curl -sS -o /tmp/sonar-status.json -w "%{http_code}" "${URL}/api/system/status")
          echo "GET /api/system/status -> HTTP ${STATUS_CODE}"
          if is_cloudflare_block /tmp/sonar-status.json; then
            echo "::error::Cloudflare blocked this GitHub Actions runner before SonarQube was reached."
            echo "::error::Allow GitHub Actions IPs in Cloudflare for sonarqube.q1.co.nz, skip bot/WAF rules on /api/*, or use a self-hosted runner. See README SonarQube troubleshooting."
            exit 1
          fi
          cat /tmp/sonar-status.json
          echo ""

          if [ "$STATUS_CODE" != "200" ]; then
            echo "::error::SonarQube /api/system/status returned HTTP ${STATUS_CODE} (expected 200)."
            exit 1
          fi

          echo "Validating token..."
          AUTH_CODE=$(curl -sS -o /tmp/sonar-auth.json -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            "${URL}/api/authentication/validate")
          echo "GET /api/authentication/validate -> HTTP ${AUTH_CODE}"
          if is_cloudflare_block /tmp/sonar-auth.json; then
            echo "::error::Cloudflare blocked token validation. Fix Cloudflare access for GitHub Actions runners (see README)."
            exit 1
          fi
          cat /tmp/sonar-auth.json
          echo ""

          if [ "$AUTH_CODE" != "200" ]; then
            echo "::error::SonarQube rejected the token (HTTP ${AUTH_CODE}). Regenerate SONAR_TOKEN for project key nexus."
            exit 1
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
