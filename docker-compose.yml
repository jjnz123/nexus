services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8374:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:8374}
      XAI_API_KEY: ${XAI_API_KEY:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@localhost}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitor-worker:
    build: .
    restart: unless-stopped
    command: ["npm", "run", "worker:monitor"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      UPLOAD_DIR: /app/uploads

volumes:
  pgdata:
  uploads:
